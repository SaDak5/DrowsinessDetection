runtime: python39

env: standard

entrypoint: gunicorn -b :$PORT main:app

env_variables:
  MODEL_PATH: "models/best_model_mobilenetv2.h5"
  IMG_SIZE: "224"
  THRESHOLD: "0.5"

handlers:
  - url: /static
    static_dir: static

  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301

automatic_scaling:
  min_instances: 1
  max_instances: 10
  min_pending_latency: 0s
  max_pending_latency: 30s

timeout: "60s"

sessions:
  sessions_enabled: False

skip_files:
  - ^dataset/.*
  - ^\.git/.*
  - ^__pycache__/.*
  - ^src/__pycache__/.*
  - ^\.gitignore$
  - ^README\.md$
  - ^\.env$
  - ^\.venv/.*
  - ^venv/.*
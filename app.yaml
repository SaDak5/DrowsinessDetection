runtime: python311

env: standard

entrypoint: gunicorn -b :$PORT --timeout 60 --workers 1 main:app

env_variables:
  MODEL_PATH: "models/best_model_mobilenetv2.h5"
  IMG_SIZE: "224"
  THRESHOLD: "0.5"
  TF_CPP_MIN_LOG_LEVEL: "3"

resources:
  memory_gb: 2

handlers:
  - url: /static
    static_dir: static
    secure: always

  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301

automatic_scaling:
  min_instances: 1
  max_instances: 5
  min_pending_latency: 0.1s
  max_pending_latency: 10s
